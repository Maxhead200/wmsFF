services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wms
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms-dev-password
    ports:
      - "5432:5432"
    volumes:
      - wms_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      WMS_PORT: 8080
      WMS_DEMO_SEED: "true"
      WMS_DATABASE_URL: jdbc:postgresql://postgres:5432/wms
      WMS_DB_USER: wms
      WMS_DB_PASSWORD: wms-dev-password
      WMS_REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"

volumes:
  wms_postgres:
