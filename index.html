<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#d71920">
  <title>LOGOff Фулфилмент</title>
  <link rel="icon" href="./logo.svg?v=2" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((items) => items.forEach((item) => item.unregister()))
        .catch(() => {});
    }
    if ("caches" in window) {
      caches.keys()
        .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
        .catch(() => {});
    }
  </script>
</head>
<body>
  <main class="splash" aria-label="LOGOff Фулфилмент">
    <section class="brand-lockup">
      <img class="logo" src="./logo.svg?v=2" alt="LOGOff">
      <div>
        <p class="eyebrow">WMS будет собрана с нуля</p>
        <h1>LOGOff Фулфилмент</h1>
      </div>
    </section>
  </main>
</body>
</html>
